databases:
  - name: opsblog-db
    plan: free
    databaseName: ops_blog
    user: opsblog

services:
  - type: web
    name: opsblog
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: opsblog-db
          property: connectionURI
      - key: JWT_SECRET
        generateValue: true
      - key: OPENAI_API_KEY
        sync: false   # You'll set this manually in the Render dashboard
      - key: EMBEDDING_PROVIDER
        value: openai
      - key: UPLOAD_DIR
        value: /app/data/uploads
      - key: CHROMA_DB_PATH
        value: /app/data/chroma_db
      - key: CORS_ORIGINS
        value: "*"
      - key: PORT
        value: "8000"
    disk:
      name: opsblog-data
      mountPath: /app/data
      sizeGB: 1
